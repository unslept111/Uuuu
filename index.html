<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I love you 💖</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}

.text{
  position:absolute;
  width:100%;
  text-align:center;
  top:40%;
  font-size:45px;
  font-weight:bold;
  color:#ff4da6;
  text-shadow:0 0 15px #ff1493, 0 0 30px #ff69b4;
  z-index:10;
}
</style>
</head>
<body>

<div class="text">I love you pichchaporn 💖</div>

<audio id="bgm" loop>
  <source src="snaptik_7603026950604524818_v3.mp4" type="audio/mp4">
</audio>

<script>
document.addEventListener("click", function(){
  document.getElementById("bgm").play();
}, {once:true});

const canvas = document.createElement("canvas");
document.body.appendChild(canvas);
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createHeart(){
  particles = [];
  for(let i=0;i<3000;i++){
    let t = Math.random() * Math.PI * 2;
    let r = Math.sqrt(Math.random());
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);

    particles.push({
      x: canvas.width/2 + x*20*r,
      y: canvas.height/2 - y*20*r,
      baseX: canvas.width/2 + x*20*r,
      baseY: canvas.height/2 - y*20*r,
      size: 2
    });
  }
}

createHeart();

let scale = 1;
let growing = true;

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ทำหัวใจเต้น
  if(growing){
    scale += 0.005;
    if(scale >= 1.05) growing = false;
  }else{
    scale -= 0.005;
    if(scale <= 0.95) growing = true;
  }

  ctx.fillStyle="#ff2d95";

  particles.forEach(p=>{
    let dx = p.baseX - canvas.width/2;
    let dy = p.baseY - canvas.height/2;

    let x = canvas.width/2 + dx*scale;
    let y = canvas.height/2 + dy*scale;

    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
