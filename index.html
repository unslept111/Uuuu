<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I love you 💖</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}

.centerText{
  position:absolute;
  width:100%;
  text-align:center;
  top:45%;
  font-size:40px;
  font-weight:bold;
  color:#ff4da6;
  text-shadow:0 0 20px #ff1493, 0 0 40px #ff69b4;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}
</style>
</head>
<body>

<div class="centerText">
  I love you pichchaporn 💖
</div>

<audio id="bgm" loop>
  <source src="snaptik_7603026950604524818_v3.mp4" type="audio/mp4">
</audio>

<script>
document.addEventListener("click", function(){
  document.getElementById("bgm").play();
}, {once:true});

const canvas = document.createElement("canvas");
document.body.appendChild(canvas);
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<2000;i++){
  let t = Math.random() * Math.PI * 2;
  let r = Math.random();
  let x = 16 * Math.pow(Math.sin(t),3);
  let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
  
  particles.push({
    x: canvas.width/2 + x*15*r,
    y: canvas.height/2 + y*15*r,
    size: Math.random()*2+1,
    speed: Math.random()*0.5+0.2
  });
}

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#ff2d95";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();

    p.y -= p.speed;
    if(p.y < canvas.height/2 - 200){
      p.y = canvas.height/2 + 200;
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
