<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love You Pitchaporn</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}
canvas{
  display:block;
}
</style>
</head>
<body>
<button onclick="document.getElementById('bgm').play()" 
style="position:absolute;top:20px;left:20px;z-index:10;padding:10px 20px;background:#ff1493;color:white;border:none;border-radius:20px;">
🎵 เปิดเพลง
</button>

<audio autoplay loop>
  <source src="snaptik_7603026950604524818_v3.mp4" type="audio/mp4">
</audio>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];
let message = "love you pitchaporn";

// เส้นหัวใจ
function heart(t){
  let x = 16 * Math.pow(Math.sin(t),3);
  let y = 13*Math.cos(t)
          -5*Math.cos(2*t)
          -2*Math.cos(3*t)
          -Math.cos(4*t);
  return {x:x, y:-y};
}

// เอาเฉพาะเส้นรอบนอก + ชั้นด้านในเล็กน้อย
for(let t=0; t<Math.PI*2; t+=0.12){
  let h = heart(t);

  // ขอบนอก
  points.push({
    x:h.x*28,
    y:h.y*28
  });

  // ชั้นด้านในบาง ๆ
  if(Math.random() > 0.5){
    points.push({
      x:h.x*22,
      y:h.y*22
    });
  }
}

let time = 0;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  time += 0.02;
  let angle = Math.sin(time)*0.4;

  points.forEach(p=>{

    let x = p.x*Math.cos(angle);
    let z = p.x*Math.sin(angle);

    let perspective = 1000/(1000+z);

    let screenX = x*perspective + canvas.width/2;
    let screenY = p.y*perspective + canvas.height/2;

    ctx.fillStyle="#ff4da6";
    ctx.shadowColor="#ff1493";
    ctx.shadowBlur=15;
    ctx.font="bold 20px monospace";
    ctx.fillText(message, screenX, screenY);
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
