<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love 💖</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family: monospace;
}
canvas{
  display:block;
}
</style>
</head>
<body>

<audio id="bgm" loop>
  <source src="snaptik_7603026950604524818_v3.mp4" type="audio/mp4">
</audio>

<script>
document.addEventListener("click", function(){
  document.getElementById("bgm").play();
}, {once:true});

const canvas = document.createElement("canvas");
document.body.appendChild(canvas);
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const text = "love you pichchaporn";

let scale = 18;   // ขนาดหัวใจ
let density = 0.06; // ยิ่งเล็กยิ่งแน่น

function drawHeart(time){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  ctx.fillStyle = "#ff2d95";
  ctx.font = "14px monospace";

  let beat = 1 + Math.sin(time * 0.002) * 0.05; // ทำให้หัวใจเต้นเบา ๆ

  for(let x=-1.5; x<1.5; x+=density){
    for(let y=-1.5; y<1.5; y+=density){
      
      let formula = Math.pow(x*x + y*y - 1, 3) - x*x*y*y*y;

      if(formula <= 0){
        let drawX = canvas.width/2 + x * scale * 20 * beat;
        let drawY = canvas.height/2 - y * scale * 20 * beat;

        ctx.fillText(text, drawX, drawY);
      }
    }
  }
}

function animate(time){
  drawHeart(time);
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
